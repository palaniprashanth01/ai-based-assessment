[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
# Function timeout is set via `export const maxDuration = 26` inside
# frontend/app/api/assess/route.ts. @netlify/plugin-nextjs reads that and
# configures the wrapped function. `timeout` is NOT valid at the top
# level of [functions]; setting it here causes "must be an object" errors.
