[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  # 26s is the absolute max Netlify allows for synchronous functions
  # (any plan). Gemini PDF calls usually finish in 8–20s, so this gives
  # us headroom without blowing past Netlify's hard ceiling.
  timeout = 26
